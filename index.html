<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Video Album</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-size: 1.8em;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .thumb {
      position: relative;
    }

    .thumb img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid #333;
    }

    .play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 35px;
      opacity: 0.9;
      pointer-events: none;
    }

    .info {
      padding: 8px;
      font-size: 13px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      color: #aaa;
      font-size: 12px;
    }

    a {
      text-decoration: none;
      color: white;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .thumb img {
        height: 140px;
      }
      .play {
        font-size: 28px;
      }
      .info {
        font-size: 12px;
      }
      .stats {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

<h1>🔥 Trending Videos</h1>

<div class="gallery">
  <!-- Video cards (1-15) same as before -->
  <!-- Copy all 15 <a> blocks from previous script here -->
  <!-- Example: -->
  <a href="https://your-video-link1.com" target="_blank">
    <div class="card">
      <div class="thumb">
        <img src="https://via.placeholder.com/300">
        <div class="play">▶</div>
      </div>
      <div class="info">
        Amazing Video Title 😍
        <div class="stats">
          <span>❤️ 12K</span>
          <span>💬 1.2K</span>
          <span>👁 50K</span>
        </div>
      </div>
    </div>
  </a>
</div>

</body>
</html>
