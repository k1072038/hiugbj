<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Photo Album</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      padding: 20px;
      background: #333;
      color: white;
      margin: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery a {
      display: block;
      overflow: hidden;
      border-radius: 10px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>

<h1>My Photo Album</h1>

<div class="gallery">

  <!-- Image 1 -->
  <a href="https://your-link-1.com" target="_blank">
    <img src="https://via.placeholder.com/300" alt="Photo 1">
  </a>

  <!-- Image 2 -->
  <a href="https://your-link-2.com" target="_blank">
    <img src="https://via.placeholder.com/300" alt="Photo 2">
  </a>

  <!-- Image 3 -->
  <a href="https://your-link-3.com" target="_blank">
    <img src="https://via.placeholder.com/300" alt="Photo 3">
  </a>

  <!-- Image 4 -->
  <a href="https://your-link-4.com" target="_blank">
    <img src="https://via.placeholder.com/300" alt="Photo 4">
  </a>

</div>

</body>
</html>
